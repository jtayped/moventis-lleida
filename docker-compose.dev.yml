# Development compose — runs only infrastructure.
# Start with: docker compose -f docker-compose.dev.yml up -d
# Then run apps locally: pnpm dev (or pnpm dev:web)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moventis
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moventis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
